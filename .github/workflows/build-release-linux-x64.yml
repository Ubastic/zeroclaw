name: Build Release Linux x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v0.1.7)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: read

env:
  CARGO_TERM_COLOR: always
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: core.hooksPath
  GIT_CONFIG_VALUE_0: /dev/null

jobs:
  build-linux-x64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (static)
        env:
          RUSTFLAGS: '-C target-feature=+crt-static'
        run: |
          cargo build --profile release-fast --locked --target x86_64-unknown-linux-musl

      - name: Check binary size
        run: |
          ls -lh target/x86_64-unknown-linux-musl/release-fast/zeroclaw
          size_bytes=$(stat -c%s target/x86_64-unknown-linux-musl/release-fast/zeroclaw)
          size_mb=$((size_bytes / 1024 / 1024))
          echo "Binary size: ${size_mb}MB"
          if [ $size_bytes -gt 20971520 ]; then
            echo "::warning::Binary size (${size_mb}MB) exceeds 20MB"
          fi

      - name: Verify static linking
        run: |
          ldd target/x86_64-unknown-linux-musl/release-fast/zeroclaw || true
          ldd_output=$(ldd target/x86_64-unknown-linux-musl/release-fast/zeroclaw 2>&1)
          if echo "$ldd_output" | grep -qE "statically linked|not a dynamic executable"; then
            echo "✅ Binary is fully static (no GLIBC dependencies)"
          else
            echo "⚠️ Binary has dynamic dependencies"
            echo "$ldd_output"
            exit 1
          fi

      - name: Copy license files
        run: |
          cp LICENSE-APACHE LICENSE-APACHE.txt
          cp LICENSE-MIT LICENSE-MIT.txt
          cp NOTICE NOTICE.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-linux-x64
          path: |
            target/x86_64-unknown-linux-musl/release-fast/zeroclaw
            LICENSE-APACHE.txt
            LICENSE-MIT.txt
            NOTICE.txt
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build-linux-x64
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: zeroclaw-linux-x64

      - name: Display artifacts
        run: |
          ls -lh
          ls -lh target/x86_64-unknown-linux-musl/release-fast || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: ${{ github.event.inputs.draft || 'true' }}
          files: |
            target/x86_64-unknown-linux-musl/release-fast/zeroclaw
            LICENSE-APACHE.txt
            LICENSE-MIT.txt
            NOTICE.txt
          body: |
            ## ZeroClaw ${{ github.event.inputs.release_tag || github.ref_name }}

            ### Linux x86_64 Release (Statically Linked)

            **Binary:** `zeroclaw`
            
            **Compatibility:** This binary is statically linked with musl libc and works on all Linux distributions (including Ubuntu 18.04, CentOS 7, Alpine, etc.) without GLIBC version requirements.

            #### Installation
            ```bash
            # Download binary
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.release_tag || github.ref_name }}/zeroclaw
            
            # Move to PATH
            sudo mv zeroclaw /usr/local/bin/
            sudo chmod +x /usr/local/bin/zeroclaw
            
            # Verify installation
            zeroclaw --version
            
            # Verify static linking (should output: statically linked)
            ldd /usr/local/bin/zeroclaw
            ```
            
            #### License
            This project is dual-licensed under MIT OR Apache-2.0.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
